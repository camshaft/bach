[workspace]
members = [
    "bach",
    "bach-tests",
]
resolver = "2"

[profile.bench]
lto = true
codegen-units = 1
incremental = false

[profile.fuzz]
inherits = "dev"
opt-level = 3
incremental = false
codegen-units = 1

[profile.release-debug]
inherits = "dev"
opt-level = 3

[patch.crates-io]
bolero-generator = { path = "../bolero/lib/bolero-generator" }